</div>
<div class="relative">
<input class="w-full px-md py-sm bg-surface border border-outline rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition-all text-body-md" id="password" placeholder="••••••••" type="password">
</div>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary text-white font-label-md text-label-md py-md rounded-lg hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">

</p>

</div>
</main>
<script>
        // Micro-interaction for input focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Simple button ripple simulation
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const ripple = document.createElement('span');
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.classList.add('absolute', 'w-0', 'h-0', 'bg-white/20', 'rounded-full', 'transition-all', 'duration-500', 'pointer-events-none');
                
                this.classList.add('relative', 'overflow-hidden');
                this.appendChild(ripple);
                
                requestAnimationFrame(() => {
                    ripple.style.width = '200%';
                    ripple.style.height = '200%';
                    ripple.style.marginLeft = '-100%';
                    ripple.style.marginTop = '-100%';
                    ripple.style.opacity = '0';
                });
                
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
